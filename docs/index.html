<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whispaper Releases</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f3ec;
      --ink: #231d16;
      --muted: #6f6253;
      --line: rgba(98, 78, 54, 0.14);
      --panel: rgba(255, 255, 255, 0.84);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(184, 145, 95, 0.16), transparent 34%),
        linear-gradient(160deg, #faf6ef, var(--paper) 42%, #ece5d9);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 32px;
    }
    main {
      width: min(820px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(51, 39, 24, 0.12);
      padding: 36px;
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    .card {
      margin-top: 24px;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
    }
    code {
      font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      word-break: break-all;
    }
    a {
      color: #7d4d19;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Whispaper Releases</h1>
    <p>这个站点用于给 Whispaper 提供 Sparkle 更新清单和公开发布文件。</p>
    <div class="card">
      <p>更新 Feed：</p>
      <code>https://xiaohuliming.github.io/Whispaper-Releases/appcast.xml</code>
    </div>
    <div class="card">
      <p>GitHub Releases：</p>
      <a href="https://github.com/xiaohuliming/Whispaper-Releases/releases">https://github.com/xiaohuliming/Whispaper-Releases/releases</a>
    </div>
  </main>
</body>
</html>
